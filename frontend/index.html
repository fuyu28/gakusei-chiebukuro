<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生知恵袋 - トップページ</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/threads.css">
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo">学生知恵袋</a>

        <nav>
          <!-- ログイン済み -->
          <div class="logged-in" style="display: none;">
            <span id="user-info"></span>
            <a href="new-thread.html" class="btn-primary">質問する</a>
            <a href="#" id="logout-button">ログアウト</a>
          </div>

          <!-- 未ログイン -->
          <div class="logged-out">
            <a href="login.html">ログイン</a>
            <a href="signup.html" class="btn-primary">アカウント作成</a>
          </div>
        </nav>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <h1 class="page-title">質問一覧</h1>
    </div>

    <!-- フィルターバー -->
    <div class="filter-bar">
      <div class="filter-group">
        <label class="filter-label">ステータス:</label>
        <select id="status-filter" class="filter-select">
          <option value="">すべて</option>
          <option value="open">未解決</option>
          <option value="resolved">解決済み</option>
        </select>

        <label class="filter-label">科目:</label>
        <select id="subject-filter" class="filter-select">
          <option value="">すべて</option>
          <!-- 科目タグはJavaScriptで動的に追加 -->
        </select>

        <label class="filter-label">並び順:</label>
        <select id="sort-filter" class="filter-select">
          <option value="created_at">投稿日時</option>
          <option value="updated_at">更新日時</option>
        </select>
      </div>
    </div>

    <!-- エラーメッセージ -->
    <div id="error-message" class="error-message"></div>

    <!-- ローディング -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
    </div>

    <!-- スレッド一覧 -->
    <div id="threads-list" class="threads-list">
      <!-- スレッドカードがJavaScriptで動的に追加される -->
    </div>

    <!-- 空状態 -->
    <div id="empty-state" class="empty-state" style="display: none;">
      <div class="empty-state-icon">📝</div>
      <p class="empty-state-message">質問がありません</p>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2024 学生知恵袋. All rights reserved.</p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script type="module" src="/js/index.js"></script>
</body>
</html>
